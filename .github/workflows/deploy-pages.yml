name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  # Lets you trigger a deploy manually from the Actions tab without needing a new commit.
  workflow_dispatch:

# Only one deployment at a time; if a new push comes in while one is running,
# let the in-progress one finish rather than cancelling it mid-deploy.
concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Stage public site files
        # Only index.html should actually be served — test/ and README.md
        # are dev tooling and docs, not part of the deployed app.
        # .nojekyll tells Pages to skip Jekyll processing, since this is
        # already a plain static file.
        run: |
          mkdir -p _site
          cp index.html _site/
          touch _site/.nojekyll

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
